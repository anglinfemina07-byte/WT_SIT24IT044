    <style>

        body{
            background-color:lightblue;
            font-family:Arial, sans-serif;
        }

        .container{
            width:300px;
            margin:100px auto;
            background-color:white;
            padding:30px;
            border-radius:10px;
            text-align:center;
        }

        h2{
            color:darkblue;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px;
            border:1px solid gray;
            border-radius:5px;
        }

        .login{
            width:95%;
            padding:10px;
            background-color:green;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .register{
            width:95%;
            padding:10px;
            margin-top:10px;
            background-color:blue;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            opacity:0.8;
        }
.login, .register{
    width:45%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.login{
    background-color:green;
    margin-right:5px;
}

.register{
    background-color:blue;
}

button:hover{
    opacity:0.8;
}

    </style>

</head>

<body>

<div class="container">

    <h2>Login</h2>

    <form>

        <input type="text" placeholder="Enter Username" required>

        <input type="password" placeholder="Enter Password" required>

        <button class="login" type="submit">Login</button>

        <button class="register" type="button">Register</button>

    </form>

</div>

</body>
